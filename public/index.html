<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AWS SAA Study Console</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="sidebar-head">
          <a class="brand" href="/" data-link>
            <span class="brand-mark">AWS</span>
            <span>
              <strong>SAA Study Console</strong>
              <small>Sections 1-9</small>
            </span>
          </a>
          <button class="icon-button sidebar-toggle" id="sidebarToggle" type="button" aria-label="Collapse sidebar" aria-expanded="true" title="Collapse sidebar">☰</button>
        </div>
        <nav class="nav-stack">
          <a href="/" data-link>Dashboard</a>
          <a href="/summary" data-link>Master Summary</a>
          <a href="/visuals" data-link>Visuals</a>
          <a href="/flashcards" data-link>Flashcards</a>
          <a href="/exam" data-link>Exam Center</a>
        </nav>
        <div class="section-nav" id="sectionNav"></div>
      </aside>
      <div class="collapsed-sidebar-panel" aria-label="Collapsed sidebar navigation">
        <button class="icon-button sidebar-reopen" id="sidebarReopen" type="button" aria-label="Open sidebar" title="Open sidebar">›</button>
        <span class="collapsed-page-title" id="collapsedPageTitle">Study Console</span>
      </div>
      <main class="main">
        <header class="topbar">
          <button class="mobile-menu" id="menuButton" type="button" aria-label="Toggle navigation">☰</button>
          <div class="topbar-title">
            <p class="eyebrow">AWS Certified Solutions Architect - Associate</p>
            <h1 id="pageTitle">Study Console</h1>
          </div>
          <div class="top-actions">
            <a class="top-link" href="/exam" data-link>Exam Center</a>
          </div>
        </header>
        <section id="app" class="content" aria-live="polite"></section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
